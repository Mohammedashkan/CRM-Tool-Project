version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ashkan_crm_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ashkan_crm
      POSTGRES_USER: ashkan
      POSTGRES_PASSWORD: ashkan_crm_secret_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ashkan -d ashkan_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ashkan_crm_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ashkan_crm_backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ashkan:ashkan_crm_secret_2024@postgres:5432/ashkan_crm?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ashkan-crm-jwt-super-secret-key-2024
      JWT_REFRESH_SECRET: ashkan-crm-jwt-refresh-secret-key-2024
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ashkan_crm_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
